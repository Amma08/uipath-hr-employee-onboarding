name: UiPath CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy-run:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Install UiPath CLI
        run: dotnet tool install --global UiPath.CLI.Windows

      - name: Add CLI to PATH
        shell: pwsh
        run: |
          $env:USERPROFILE + "\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify CLI
        shell: pwsh
        run: uipcli --version

      # ✅ CLEAN OUTPUT FOLDER (SAFE)
      - name: Prepare output folder
        shell: pwsh
        run: |
          if (Test-Path output) {
              Remove-Item output -Recurse -Force
          }
          New-Item -ItemType Directory -Path output

      # ✅ RESTORE (FIXED)
      - name: Restore dependencies
        run: uipcli package restore . --restoreFolder output

      # ✅ PACK (NO OUTPUT ASSUMPTION)
      - name: Pack project
        run: uipcli package pack .

      # 🔍 FIND PACKAGE DYNAMICALLY
      - name: Find package
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Recurse -Filter *.nupkg | Select-Object -First 1
          if (-not $pkg) {
              Write-Error "❌ No package found"
              exit 1
          }
          echo "PACKAGE_PATH=$($pkg.FullName)" >> $env:GITHUB_ENV
          Write-Host "✅ Found package: $($pkg.FullName)"

      # 🚀 DEPLOY
      - name: Deploy Package (PAT)
        shell: cmd
        run: >
          uipcli package deploy "%PACKAGE_PATH%" https://cloud.uipath.com/ ${{ secrets.UIPATH_TENANT }} -t ${{ secrets.UIPATH_PAT }} -a ${{ secrets.UIPATH_ORG }} -o "AMMASO" --entryPointsPath "Main.xaml" --traceLevel Verbose

      # ▶️ RUN JOB
      - name: Run Job
        shell: cmd
        run: >
          uipcli job run "HR_EmployeeOnboarding2" https://cloud.uipath.com/ ${{ secrets.UIPATH_TENANT }} -t ${{ secrets.UIPATH_PAT }} -a ${{ secrets.UIPATH_ORG }} -o "AMMASO" --traceLevel Verbose

      - name: Done
        run: echo SUCCESS 🚀