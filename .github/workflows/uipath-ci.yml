name: UiPath CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy-run:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Install UiPath CLI
        run: dotnet tool install --global UiPath.CLI.Windows

      - name: Add CLI to PATH
        shell: pwsh
        run: |
          $env:USERPROFILE + "\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify CLI
        shell: pwsh
        run: uipcli --version

      - name: Clear NuGet cache
        run: dotnet nuget locals all --clear

      # ✅ CLEAN OUTPUT FOLDER
      - name: Create output folder
        run: mkdir output

      # ✅ RESTORE
      - name: Restore dependencies
        run: uipcli package restore . --restoreFolder output

      # ✅ PACK (IMPORTANT FIX)
      - name: Pack project
        run: uipcli package pack . -o output

      # 🔍 VERIFY PACKAGE EXISTS
      - name: Check output folder
        shell: cmd
        run: dir output

      # 🚨 HARD STOP IF NO PACKAGE
      - name: Fail if no package
        shell: cmd
        run: |
          IF NOT EXIST output\*.nupkg (
            echo ERROR: No package created
            exit /b 1
          )

      # 🚀 DEPLOY (CORRECT FOLDER)
      - name: Deploy Package (PAT)
        shell: cmd
        run: >
          uipcli package deploy output\*.nupkg https://cloud.uipath.com/ ${{ secrets.UIPATH_TENANT }} -t ${{ secrets.UIPATH_PAT }} -a ${{ secrets.UIPATH_ORG }} -o "AMMASO" --entryPointsPath "Main.xaml" --traceLevel Verbose

      # ▶️ RUN JOB
      - name: Run Job
        shell: cmd
        run: >
          uipcli job run "HR_EmployeeOnboarding2" https://cloud.uipath.com/ ${{ secrets.UIPATH_TENANT }} -t ${{ secrets.UIPATH_PAT }} -a ${{ secrets.UIPATH_ORG }} -o "AMMASO" --traceLevel Verbose

      - name: Done
        run: echo Pipeline completed successfully