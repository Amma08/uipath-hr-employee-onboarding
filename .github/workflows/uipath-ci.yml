name: UiPath CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Install UiPath CLI
        run: dotnet tool install --global UiPath.CLI.Windows

      - name: Add CLI to PATH
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Pack project
        run: uipcli package pack project.json -o output

            # 🚀 DEPLOY PACKAGE (WITH AUTH)
      - name: Deploy Package
        run: |
          uipcli package deploy output/*.nupkg ^
          --orchestratorUrl "https://cloud.uipath.com/${{ secrets.UIPATH_ORG }}/${{ secrets.UIPATH_TENANT }}" ^
          --accountName "${{ secrets.UIPATH_ORG }}" ^
          --applicationId "${{ secrets.UIPATH_CLIENT_ID }}" ^
          --applicationSecret "${{ secrets.UIPATH_CLIENT_SECRET }}" ^
          --folder "My Workspace"

      # 🚀 RUN JOB
      - name: Run Job
        run: |
          uipcli job start ^
          --processName "HR_EmployeeOnboarding2" ^
          --orchestratorUrl "https://cloud.uipath.com/${{ secrets.UIPATH_ORG }}/${{ secrets.UIPATH_TENANT }}" ^
          --accountName "${{ secrets.UIPATH_ORG }}" ^
          --applicationId "${{ secrets.UIPATH_CLIENT_ID }}" ^
          --applicationSecret "${{ secrets.UIPATH_CLIENT_SECRET }}" ^
          --folder "My Workspace"