name: UiPath CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy-run:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Install UiPath CLI
        run: dotnet tool install --global UiPath.CLI.Windows

      - name: Add CLI to PATH
        shell: pwsh
        run: |
          $env:USERPROFILE + "\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify CLI
        shell: pwsh
        run: uipcli --version
      - name: Prepare output folder
        shell: pwsh
        run: |
         if (Test-Path output) {
         Remove-Item output -Recurse -Force}
         New-Item -ItemType Directory -Path output
      # ✅ RESTORE (USE ROOT)
      - name: Restore dependencies
        run: uipcli package restore . 

      # 🔥 CRITICAL FIX: USE project.json
      - name: Pack project
        run: uipcli package pack project.json -o output

      # 🔍 DEBUG: SHOW FILES
      - name: Show output folder
        shell: cmd
        run: dir output

      # 🚨 STOP IF PACKAGE NOT FOUND
      - name: Ensure package exists
        shell: cmd
        run: |
          IF NOT EXIST output\*.nupkg (
            echo ❌ PACKAGE NOT CREATED
            exit /b 1
          )

      # 🚀 DEPLOY
      - name: Deploy Package (PAT)
        shell: cmd
        run: >
          uipcli package deploy output\*.nupkg https://cloud.uipath.com/ ${{ secrets.UIPATH_TENANT }} -t ${{ secrets.UIPATH_PAT }} -a ${{ secrets.UIPATH_ORG }} -o "AMMASO" --entryPointsPath "Main.xaml" --traceLevel Verbose

      # ▶️ RUN JOB
      - name: Run Job
        shell: cmd
        run: >
          uipcli job run "HR_EmployeeOnboarding2" https://cloud.uipath.com/ ${{ secrets.UIPATH_TENANT }} -t ${{ secrets.UIPATH_PAT }} -a ${{ secrets.UIPATH_ORG }} -o "AMMASO" --traceLevel Verbose

      - name: Done
        run: echo SUCCESS 🚀