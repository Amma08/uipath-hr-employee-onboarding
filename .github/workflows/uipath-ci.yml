name: UiPath CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: windows-latest

    steps:
      # ✅ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      # ✅ Install UiPath CLI
      - name: Install UiPath CLI
        run: dotnet tool install --global UiPath.CLI.Windows

      # ✅ Add CLI to PATH
      - name: Add CLI to PATH
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      # ✅ Pack project
      - name: Pack project
        run: uipcli package pack project.json -o output

      # ✅ Upload artifact (optional)
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: uipath-package
          path: output

      # 🚀 Deploy package to Orchestrator (FINAL FIX)
      - name: Deploy Package
        run: |
          uipcli package deploy output/*.nupkg `
          "https://cloud.uipath.com/${{ secrets.UIPATH_ORG }}" `
          "${{ secrets.UIPATH_TENANT }}" `
          -A "${{ secrets.UIPATH_ORG }}" `
          -I "${{ secrets.UIPATH_CLIENT_ID }}" `
          -S "${{ secrets.UIPATH_CLIENT_SECRET }}" `
          --applicationScope "OR.Folders OR.Execution OR.Jobs OR.Packages OR.Processes OR.Users" `
          -o "My Workspace"

      # 🚀 Confirmation
      - name: Deployment Complete
        run: echo "Package deployed successfully to Orchestrator"