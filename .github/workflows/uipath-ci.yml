name: UiPath CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Install UiPath CLI
        run: dotnet tool install --global UiPath.CLI.Windows

      - name: Add CLI to PATH
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Pack project
        run: uipcli package pack project.json -o output

      # 🔥 LOGIN TO ORCHESTRATOR
      - name: Login to Orchestrator
        run: |
          uipcli config set orchestratorUrl https://cloud.uipath.com
          uipcli config set orchestratorTenant ${{ secrets.UIPATH_TENANT }}
          uipcli config set accountName ${{ secrets.UIPATH_ORG }}
          uipcli config set clientId ${{ secrets.UIPATH_CLIENT_ID }}
          uipcli config set clientSecret ${{ secrets.UIPATH_CLIENT_SECRET }}

      # 🚀 DEPLOY PACKAGE
      - name: Deploy Package
        run: |
          uipcli package deploy output/*.nupkg --folder "My Workspace"

      # 🚀 CREATE / UPDATE PROCESS
      - name: Create Process
        run: |
          uipcli process create --name "HR_EmployeeOnboarding2" --package "HR_EmployeeOnboarding2" --folder "My Workspace"

      # 🚀 RUN JOB
      - name: Run Job
        run: |
          uipcli job start --process "HR_EmployeeOnboarding2" --folder "My Workspace"