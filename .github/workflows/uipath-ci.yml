name: UiPath CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy-run:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Install UiPath CLI
        run: dotnet tool install --global UiPath.CLI.Windows

      - name: Add CLI to PATH
        shell: pwsh
        run: |
          $env:USERPROFILE + "\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify CLI
        shell: pwsh
        run: uipcli --version

      - name: Create output folder
        shell: pwsh
        run: |
          if (Test-Path output) {
            Remove-Item output -Recurse -Force
          }
          New-Item -ItemType Directory -Path output

      - name: Restore dependencies
        run: uipcli package restore . --restoreFolder output

      - name: Pack project
        run: uipcli package pack . -o output

      - name: Check package
        shell: cmd
        run: dir output

      - name: Deploy Package
        shell: cmd
        run: >
          uipcli package deploy output\HR_EmployeeOnboarding2.1.0.2.nupkg https://cloud.uipath.com/ ${{ secrets.UIPATH_TENANT }} -t ${{ secrets.UIPATH_PAT }} -a ${{ secrets.UIPATH_ORG }} -o "AMMASO" --entryPointsPath "Main.xaml" --traceLevel Information

      - name: Run Job
        shell: cmd
        run: >
          uipcli job run "HR_EmployeeOnboarding2" https://cloud.uipath.com/ ${{ secrets.UIPATH_TENANT }} -t ${{ secrets.UIPATH_PAT }} -a ${{ secrets.UIPATH_ORG }} -o "AMMASO"

      - name: Done
        run: echo SUCCESS