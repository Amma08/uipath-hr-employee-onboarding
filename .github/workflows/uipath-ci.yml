name: UiPath CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy-run:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Install UiPath CLI
        run: dotnet tool install --global UiPath.CLI.Windows

      - name: Add CLI to PATH
        shell: pwsh
        run: |
          $env:USERPROFILE + "\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify CLI
        shell: pwsh
        run: |
          Get-Command uipcli
          uipcli --version

      - name: Clear NuGet cache
        run: dotnet nuget locals all --clear

      - name: Pack project
        run: uipcli package pack project.json -o output

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: uipath-package
          path: output

      - name: Deploy Package (PAT)
        shell: cmd
        run: >
          uipcli package deploy output/*.nupkg https://cloud.uipath.com/ ${{ secrets.UIPATH_TENANT }} -t ${{ secrets.UIPATH_PAT }} -a ${{ secrets.UIPATH_ORG }} -o "AMMASO/HR" --entryPointsPath "Main.xaml" --traceLevel Verbose

      - name: Run Job
        shell: cmd
        run: >
          uipcli job run "HR_EmployeeOnboarding2" https://cloud.uipath.com/ ${{ secrets.UIPATH_TENANT }} -t ${{ secrets.UIPATH_PAT }} -a ${{ secrets.UIPATH_ORG }} -o "AMMASO/HR" --traceLevel Verbose

      - name: Done
        run: echo Pipeline completed successfully